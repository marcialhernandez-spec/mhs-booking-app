<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MHS Services | Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="container-fluid">
    <ul><li><strong>Panel Admin – MHS Services</strong></li></ul>
    <ul>
      <li><a href="/index.html">Reservas</a></li>
    </ul>
  </nav>

  <main class="container">

    <article>
      <hgroup>
        <h2>Login de administrador</h2>
        <h3>Acceso privado</h3>
      </hgroup>
      <form id="loginForm" class="grid">
        <input type="email" id="email" placeholder="Correo del admin" aria-label="Correo del admin" required>
        <input type="password" id="password" placeholder="Contraseña" aria-label="Contraseña" required>
        <button type="submit">Entrar</button>
      </form>
      <small id="loginMessage"></small>
    </article>

    <article id="todaySection" style="display:none;">
      <hgroup>
        <h2>Trabajos de hoy</h2>
        <h3 id="todayDateLabel"></h3>
      </hgroup>
      <div id="todayAppointments"><em>Cargando...</em></div>
    </article>

    <article id="allSection" style="display:none;">
      <hgroup>
        <h2>Todas las citas</h2>
        <h3>Ordenadas por fecha y hora</h3>
      </hgroup>
      <div id="appointments"><em>Cargando...</em></div>
    </article>

    <article id="blockSection" style="display:none;">
      <h2>Bloquear horario</h2>
      <form id="blockForm" class="grid">
        <input type="date" id="block_date" aria-label="Fecha a bloquear" required>
        <select id="block_time" aria-label="Hora a bloquear" required>
          <option value="">Selecciona hora</option>
          <option value="08:00">08:00</option>
          <option value="10:00">10:00</option>
          <option value="12:00">12:00</option>
          <option value="14:00">14:00</option>
          <option value="16:00">16:00</option>
          <option value="18:00">18:00</option>
        </select>
        <button type="submit">Bloquear</button>
      </form>
      <small id="blockMessage"></small>
    </article>

  </main>

  <footer class="container">
    <small><a href="/index.html">Inicio</a></small>
  </footer>

  <script src="admin.js"></script>
</body>
</html>
